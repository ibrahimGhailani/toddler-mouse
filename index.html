<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pop!</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
      background: #4D96FF;
      touch-action: manipulation;
      cursor: none;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 52px;
      line-height: 1;
      transform: translate(-20%, -10%);
      transition: transform 0.08s ease-out;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
      user-select: none;
    }
    #cursor.clicking {
      animation: cursor-pop 0.2s ease-out forwards;
    }
    @keyframes cursor-pop {
      0%   { transform: translate(-20%, -10%) scale(1); }
      40%  { transform: translate(-20%, -10%) scale(1.5) rotate(-20deg); }
      100% { transform: translate(-20%, -10%) scale(1) rotate(0deg); }
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    /* Mode select */
    #mode-screen { background: #4D96FF; z-index: 200; }
    #mode-screen h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
      text-shadow: 0 4px 0 rgba(0,0,0,0.15);
      letter-spacing: 2px;
    }
    #mode-screen p {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255,255,255,0.85);
    }
    .mode-btn {
      width: min(300px, 70vw);
      padding: 18px 0;
      border: none;
      border-radius: 60px;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }
    #endless-btn { background: #6BCB77; color: #fff; }
    #survival-btn { background: #FF6B6B; color: #fff; }

    /* Game */
    #game-screen { display: none; z-index: 10; }

    /* HUD */
    #hud {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
    }
    .hud-pill {
      background: rgba(0,0,0,0.18);
      color: #fff;
      padding: 7px 18px;
      border-radius: 30px;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      font-weight: bold;
      backdrop-filter: blur(4px);
    }

    /* Circle */
    #circle {
      position: absolute;
      border-radius: 50%;
      cursor: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
    }
    #circle.pop {
      animation: pop 0.32s cubic-bezier(0.2, 0, 0.4, 1) forwards;
    }
    @keyframes pop {
      0%   { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(30); }
    }

    /* New circle entrance */
    @keyframes appear {
      0%   { transform: translate(-50%, -50%) scale(0); }
      70%  { transform: translate(-50%, -50%) scale(1.12); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    #circle.appear {
      animation: appear 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Game over */
    #gameover-screen {
      display: none;
      background: #4D96FF;
      z-index: 200;
    }
    #gameover-screen h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
      text-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    #gameover-screen .score {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: rgba(255,255,255,0.9);
    }
    #play-again-btn {
      width: min(280px, 65vw);
      padding: 18px 0;
      border: none;
      border-radius: 60px;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: bold;
      background: #FFD93D;
      color: #333;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #play-again-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    /* Survival: timer urgency pulse when low */
    .timer-urgent { animation: urgency 0.6s ease-in-out infinite alternate; }
    @keyframes urgency {
      from { background: rgba(0,0,0,0.18); }
      to   { background: rgba(255,80,80,0.55); }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor">👆</div>

<!-- Mode select -->
<div id="mode-screen" class="screen">
  <h1>Pop!</h1>
  <p>Choose a mode</p>
  <button class="mode-btn" id="endless-btn">Endless</button>
  <button class="mode-btn" id="survival-btn">Survival</button>
</div>

<!-- Game -->
<div id="game-screen" class="screen">
  <div id="hud">
    <div class="hud-pill" id="click-count">0</div>
    <div class="hud-pill" id="timer-pill" style="display:none">1:00</div>
  </div>
  <div id="circle"></div>
</div>

<!-- Game over -->
<div id="gameover-screen" class="screen">
  <h1>Amazing!</h1>
  <div class="score" id="final-score"></div>
  <button id="play-again-btn">Play Again</button>
</div>

<script>
  const COLORS = [
    '#FF6B6B', // coral red
    '#FF9A3C', // orange
    '#FFD93D', // yellow
    '#6BCB77', // green
    '#00C9A7', // teal
    '#4D96FF', // blue
    '#C77DFF', // purple
    '#FF6DB6', // pink
  ];

  const MIN_SIZE    = 5;   // % of min(vw,vh) — game over below this
  const START_SIZE  = 20;  // % of min(vw,vh)
  const SHRINK_BY   = 3;   // percentage points per shrink
  const CLICKS_PER_SHRINK = 10;
  const LEVEL_TIME  = 60;  // seconds before auto-shrink

  let mode, bgColor, circleColor, circleSize;
  let totalClicks, levelClicks;
  let timerInterval, timeLeft;
  let busy = false;
  let audioCtx = null;

  const modeScreen    = document.getElementById('mode-screen');
  const gameScreen    = document.getElementById('game-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const circleEl      = document.getElementById('circle');
  const clickCountEl  = document.getElementById('click-count');
  const timerPill     = document.getElementById('timer-pill');
  const finalScoreEl  = document.getElementById('final-score');

  // ── Audio ──────────────────────────────────────────────────────────────────
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playChime(colorIndex) {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();

    // Major pentatonic C5 scale — always sounds pleasant
    const freqs = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51];
    const baseFreq = freqs[colorIndex % freqs.length];

    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.6, ctx.currentTime + 0.06);

    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  }

  function playMiss() {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();

    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'square';
    osc.frequency.setValueAtTime(180, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);

    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function pickColor(exclude) {
    const pool = COLORS.filter(c => c !== exclude);
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function circlePx() {
    return (circleSize / 100) * Math.min(window.innerWidth, window.innerHeight);
  }

  function placeCircle(animate) {
    const r  = circlePx() / 2;
    const x  = r + Math.random() * (window.innerWidth  - 2 * r);
    const y  = r + Math.random() * (window.innerHeight - 2 * r);
    const px = circlePx();

    circleEl.classList.remove('pop', 'appear');
    circleEl.style.cssText = `
      left: ${x}px;
      top: ${y}px;
      width: ${px}px;
      height: ${px}px;
      background-color: ${circleColor};
      opacity: 1;
    `;

    if (animate) {
      void circleEl.offsetWidth; // reflow
      circleEl.classList.add('appear');
    }
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  function updateHUD() {
    clickCountEl.textContent = totalClicks;
    if (mode === 'survival') {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      timerPill.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      timerPill.classList.toggle('timer-urgent', timeLeft <= 10);
    }
  }

  // ── Shrink / timer ─────────────────────────────────────────────────────────
  function resetLevelTimer() {
    clearInterval(timerInterval);
    timeLeft = LEVEL_TIME;
    updateHUD();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateHUD();
      if (timeLeft <= 0) doShrink();
    }, 1000);
  }

  function doShrink() {
    circleSize -= SHRINK_BY;
    levelClicks = 0;
    if (circleSize <= MIN_SIZE) {
      triggerGameOver();
      return;
    }
    // Resize circle in place for a moment, then reset timer
    const px = circlePx();
    circleEl.style.width  = px + 'px';
    circleEl.style.height = px + 'px';
    resetLevelTimer();
  }

  // ── Game over ──────────────────────────────────────────────────────────────
  function triggerGameOver() {
    clearInterval(timerInterval);
    gameScreen.style.display = 'none';
    gameoverScreen.style.display = 'flex';
    finalScoreEl.textContent = `You popped ${totalClicks} bubble${totalClicks !== 1 ? 's' : ''}!`;
  }

  // ── Click handler ──────────────────────────────────────────────────────────
  circleEl.addEventListener('click', onCircleClick);
  circleEl.addEventListener('touchstart', e => { e.preventDefault(); onCircleClick(); }, { passive: false });

  gameScreen.addEventListener('click', e => {
    if (e.target !== circleEl && !busy) playMiss();
  });
  gameScreen.addEventListener('touchstart', e => {
    if (e.target !== circleEl && !busy) playMiss();
  }, { passive: true });

  function onCircleClick() {
    if (busy) return;
    busy = true;

    const colorIdx = COLORS.indexOf(circleColor);
    playChime(colorIdx);

    totalClicks++;
    levelClicks++;
    updateHUD();

    const newBg     = circleColor;
    const newCircle = pickColor(newBg);

    // Start pop animation
    circleEl.classList.remove('appear');
    void circleEl.offsetWidth;
    circleEl.classList.add('pop');

    // Swap bg color halfway through so it looks seamless
    setTimeout(() => {
      document.body.style.background = newBg;
      bgColor      = newBg;
      circleColor  = newCircle;
    }, 160);

    // After animation: handle shrink then place new circle
    setTimeout(() => {
      if (mode === 'survival' && levelClicks >= CLICKS_PER_SHRINK) {
        circleSize -= SHRINK_BY;
        levelClicks = 0;
        if (circleSize <= MIN_SIZE) { triggerGameOver(); return; }
        resetLevelTimer();
      }
      placeCircle(true);
      busy = false;
    }, 320);
  }

  // ── Start game ─────────────────────────────────────────────────────────────
  function startGame(selectedMode) {
    mode        = selectedMode;
    circleSize  = START_SIZE;
    totalClicks = 0;
    levelClicks = 0;

    bgColor     = COLORS[Math.floor(Math.random() * COLORS.length)];
    circleColor = pickColor(bgColor);
    document.body.style.background = bgColor;

    modeScreen.style.display    = 'none';
    gameoverScreen.style.display = 'none';
    gameScreen.style.display    = 'flex';

    if (mode === 'survival') {
      timerPill.style.display = 'block';
      resetLevelTimer();
    } else {
      timerPill.style.display = 'none';
      clearInterval(timerInterval);
    }

    updateHUD();
    placeCircle(true);
  }

  // ── Buttons ────────────────────────────────────────────────────────────────
  document.getElementById('endless-btn').addEventListener('click',  () => startGame('endless'));
  document.getElementById('survival-btn').addEventListener('click', () => startGame('survival'));
  document.getElementById('play-again-btn').addEventListener('click', () => {
    gameoverScreen.style.display = 'none';
    modeScreen.style.display     = 'flex';
  });

  // Unlock audio on first interaction (iOS)
  document.addEventListener('touchstart', () => {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
  }, { once: true });

  // ── Custom cursor ──────────────────────────────────────────────────────────
  const cursorEl = document.getElementById('cursor');

  document.addEventListener('mousemove', e => {
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
  });

  document.addEventListener('mousedown', () => {
    cursorEl.classList.remove('clicking');
    void cursorEl.offsetWidth;
    cursorEl.classList.add('clicking');
  });
  document.addEventListener('mouseup', () => cursorEl.classList.remove('clicking'));

  // Hide cursor when mouse leaves window
  document.addEventListener('mouseleave', () => cursorEl.style.opacity = '0');
  document.addEventListener('mouseenter', () => cursorEl.style.opacity = '1');
</script>
</body>
</html>
